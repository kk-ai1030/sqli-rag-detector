<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL注入智能分析助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主容器 */
        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .chat-header {
            background: #2c3e50;
            color: white;
            padding: 20px 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #3498db;
        }

        .message.assistant .message-avatar {
            background: #2c3e50;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .message-content {
            background: #3498db;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* 代码样式 */
        .message-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #e74c3c;
        }

        /* 输入区域 */
        .input-container {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #f5f5f5;
            border-radius: 30px;
            padding: 8px 8px 8px 20px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #3498db;
            background: white;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            padding: 10px 0;
            max-height: 80px;
        }

        .input-wrapper textarea::placeholder {
            color: #aaa;
        }

        .input-wrapper button {
            background: #3498db;
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-wrapper button:hover {
            background: #2980b9;
        }

        .input-wrapper button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        /* 快捷指令 */
        .quick-commands {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .quick-cmd {
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-cmd:hover {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        /* 靶场按钮 */
        .target-btn {
            background: #27ae60 !important;
            margin-top: 10px;
            width: auto;
            padding: 6px 16px;
            font-size: 12px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .target-btn:hover {
            background: #219a52 !important;
        }

        /* 加载动画 */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 头部 -->
        <div class="chat-header">
            <h1>
                <span>🛡️</span> SQL注入智能分析助手
            </h1>
            <p>基于 RAG + Agent + 通义千问</p>
        </div>

        <!-- 消息区域 -->
        <div class="messages-container" id="messagesContainer">
            <div class="message assistant">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    👋 你好！我是 SQL 注入安全分析专家。<br><br>
                    我可以：<br>
                    • 检测 SQL 注入风险<br>
                    • 解释注入原理和修复方法<br>
                    • 帮你打开靶场实战验证<br><br>
                    试试输入一条 SQL 语句吧！
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="输入 SQL 语句或问题..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
            <div class="quick-commands">
                <span class="quick-cmd" onclick="insertSQL(`1' OR '1'='1`)">🔓 1' OR '1'='1</span>
                <span class="quick-cmd" onclick="insertSQL(`' UNION SELECT username,password FROM users--`)">🔗 UNION注入</span>
                <span class="quick-cmd" onclick="insertSQL(`' AND SLEEP(5)--`)">⏱️ 时间盲注</span>
                <span class="quick-cmd" onclick="insertSQL(`' AND 1=1--`)">✅ 布尔盲注</span>
                <span class="quick-cmd" onclick="insertSQL(`打开靶场`)">🎯 打开靶场</span>
            </div>
        </div>
    </div>

    <script>
        // 会话 ID（用于后端记忆）
        let sessionId = localStorage.getItem('session_id');
        if (!sessionId) {
            sessionId = 'session_' + Date.now();
            localStorage.setItem('session_id', sessionId);
        }

        let isLoading = false;
        let lastInjectionType = null;

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // 格式化消息
        function formatMessage(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        // 添加消息到界面
        function addMessage(role, content, showButton = false, injectionType = null) {
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(content);

            if (showButton && injectionType) {
                const button = document.createElement('button');
                button.className = 'target-btn';
                button.textContent = `🎯 打开靶场验证（${injectionType}）`;
                button.onclick = () => openTarget(injectionType);
                contentDiv.appendChild(button);
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        // 显示加载动画
        function showTypingIndicator() {
            const container = document.getElementById('messagesContainer');
            const id = 'typing_' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // 打开靶场
        async function openTarget(injectionType) {
            if (!injectionType) {
                alert('无法识别注入类型');
                return;
            }

            addMessage('assistant', `🔄 正在打开 ${injectionType} 靶场...`);

            try {
                const response = await fetch('/open_target', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ injection_type: injectionType })
                });
                const data = await response.json();

                if (data.success) {
                    addMessage('assistant', `✅ 已打开 ${injectionType} 靶场：${data.url}\n\n如果页面没有自动打开，请检查 Docker 容器是否已启动。`);
                } else {
                    addMessage('assistant', `❌ ${data.error}\n\n请确保：\n1. Docker 已启动\n2. 靶场容器正在运行（docker start sqli-labs-8scenes）`);
                }
            } catch (error) {
                addMessage('assistant', `❌ 请求失败：${error.message}`);
            }
        }

        // 发送消息
        async function sendMessage() {
            if (isLoading) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            addMessage('user', message);

            isLoading = true;
            const typingId = showTypingIndicator();

            try {
                const response = await fetch('/agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, session_id: sessionId })
                });
                const data = await response.json();
                removeTypingIndicator(typingId);

                // 检查回复中是否包含注入类型，用于显示靶场按钮
                let injectionType = null;
                if (data.response.includes('联合查询')) injectionType = '联合查询注入';
                else if (data.response.includes('时间盲注')) injectionType = '时间盲注';
                else if (data.response.includes('布尔盲注')) injectionType = '布尔盲注';
                else if (data.response.includes('报错注入')) injectionType = '报错注入';

                if (injectionType) {
                    lastInjectionType = injectionType;
                    addMessage('assistant', data.response, true, injectionType);
                } else {
                    addMessage('assistant', data.response);
                }
            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', '❌ 网络错误，请稍后重试。');
            } finally {
                isLoading = false;
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function insertSQL(sql) {
            document.getElementById('messageInput').value = sql;
            document.getElementById('messageInput').focus();
        }
    </script>
</body>
</html>
